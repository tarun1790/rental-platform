name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: 'Upload signed AAB to Google Play internal track as a draft'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build React Production Bundle
        run: npm run build

      - name: Setup Java JDK 21 (Required for Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Sync Capacitor Web Assets to Android Project
        id: sync
        run: npx cap sync android

      - name: Capture Failure Logs
        if: failure() && steps.sync.outcome == 'failure'
        run: |
          npx cap sync android > sync_log.txt 2>&1 || true
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b build-debug
          git add sync_log.txt
          git commit -m "Commit build failure logs [skip ci]"
          git push -f origin build-debug

      - name: Decode Android Upload Keystore
        env:
          REALPAL_UPLOAD_KEYSTORE_BASE64: ${{ secrets.REALPAL_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$REALPAL_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "$REALPAL_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          fi

      - name: Compile Release APK (For Direct Installation)
        id: build_apk
        env:
          REALPAL_UPLOAD_STORE_FILE: upload-keystore.jks
          REALPAL_UPLOAD_STORE_PASSWORD: ${{ secrets.REALPAL_UPLOAD_STORE_PASSWORD }}
          REALPAL_UPLOAD_KEY_ALIAS: ${{ secrets.REALPAL_UPLOAD_KEY_ALIAS }}
          REALPAL_UPLOAD_KEY_PASSWORD: ${{ secrets.REALPAL_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Capture Gradle Failure Logs
        if: failure() && steps.build_apk.outcome == 'failure'
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace > ../sync_log.txt 2>&1 || true
          cd ..
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b build-debug
          git add sync_log.txt
          git commit -m "Commit Gradle compile failure logs [skip ci]"
          git push -f origin build-debug

      - name: Compile Release AAB (For Google Play Store Upload)
        env:
          REALPAL_UPLOAD_STORE_FILE: upload-keystore.jks
          REALPAL_UPLOAD_STORE_PASSWORD: ${{ secrets.REALPAL_UPLOAD_STORE_PASSWORD }}
          REALPAL_UPLOAD_KEY_ALIAS: ${{ secrets.REALPAL_UPLOAD_KEY_ALIAS }}
          REALPAL_UPLOAD_KEY_PASSWORD: ${{ secrets.REALPAL_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Draft Release to Google Play Internal Track
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_play && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.realpal.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: realpal-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB (App Bundle) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: realpal-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
