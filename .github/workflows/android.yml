name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build React Production Bundle
        run: npm run build

      - name: Setup Java JDK 17 (Required for Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Sync Capacitor Web Assets to Android Project
        id: sync
        run: npx cap sync android

      - name: Capture Failure Logs
        if: failure() && steps.sync.outcome == 'failure'
        run: |
          npx cap sync android > sync_log.txt 2>&1 || true
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b build-debug
          git add sync_log.txt
          git commit -m "Commit build failure logs [skip ci]"
          git push -f origin build-debug

      - name: Compile Unsigned Release APK (For Direct Installation)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Compile Unsigned Release AAB (For Google Play Store Upload)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: realpal-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Release AAB (App Bundle) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: realpal-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
